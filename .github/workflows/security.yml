name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC — catches new CVEs in existing deps
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # Job 1: pip-audit — scan dependencies for known CVEs
  # Reads uv.lock and checks every package against the OSV vulnerability DB.
  # Fails the build if any dependency has a known, fixable vulnerability.
  # --------------------------------------------------------------------------
  dependency-audit:
    name: Dependency CVE Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit and uv
        run: pip install pip-audit uv

      - name: Audit dependencies from uv.lock
        # --no-emit-project excludes the local editable package (not on PyPI)
        # --no-dev excludes dev-only dependencies
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt > /tmp/requirements.txt
          pip-audit -r /tmp/requirements.txt --progress-spinner off

  # --------------------------------------------------------------------------
  # Job 2: bandit — static analysis for Python security anti-patterns
  # Scans source code for: hardcoded secrets, shell injection, weak crypto,
  # use of pickle, SQL injection patterns, insecure temp files, etc.
  # Intentional patterns (exec for Globus Compute, 0.0.0.0 server bind) are
  # marked with # nosec in source and skipped here.
  # --------------------------------------------------------------------------
  static-analysis:
    name: Static Security Analysis (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          bandit -r stream/ \
            --severity-level medium \
            --confidence-level medium \
            --exclude stream/middleware/tests,stream/desktop \
            -f json -o bandit-report.json || true
          bandit -r stream/ \
            --severity-level medium \
            --confidence-level medium \
            --exclude stream/middleware/tests,stream/desktop

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  # --------------------------------------------------------------------------
  # Job 3: gitleaks CLI — scan git history for accidentally committed secrets
  # Uses the free gitleaks CLI directly (gitleaks-action@v2 requires a paid
  # license for organization repos).
  # --------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — gitleaks scans all commits

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --log-opts="--all" --redact --exit-code 1 --config .gitleaks.toml
