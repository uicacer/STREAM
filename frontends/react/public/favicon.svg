<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    STREAM Favicon - A simple bot/AI icon

    This SVG creates a small robot face icon:
    - Dark circular background
    - Blue robot face with eyes and mouth
    - Small antenna on top

    SVG = Scalable Vector Graphics
    Unlike PNG/JPG (pixel images), SVG uses math to draw shapes.
    This means it looks crisp at ANY size - perfect for favicons.
  -->

  <!-- Background circle - dark blue/purple -->
  <circle cx="16" cy="16" r="14" fill="#1a1a2e"/>

  <!-- Robot face - rounded rectangle -->
  <rect x="10" y="11" width="12" height="10" rx="2" fill="#60a5fa"/>

  <!-- Eyes - two small circles -->
  <circle cx="13" cy="15" r="1.5" fill="#1a1a2e"/>
  <circle cx="19" cy="15" r="1.5" fill="#1a1a2e"/>

  <!-- Mouth - small rectangle -->
  <rect x="14" y="18" width="4" height="1" rx="0.5" fill="#1a1a2e"/>

  <!-- Antenna stem -->
  <rect x="15" y="7" width="2" height="4" fill="#60a5fa"/>

  <!-- Antenna top - small circle -->
  <circle cx="16" cy="6" r="2" fill="#60a5fa"/>
</svg>
