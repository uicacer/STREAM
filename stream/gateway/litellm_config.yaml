# ======================================================================================
# STREAM Gateway - LiteLLM Configuration (https://docs.litellm.ai/docs/proxy/configs)
# ======================================================================================

model_list:
  # ===========================================================================
  # TIER 1: LOCAL MODELS (Ollama)
  # ===========================================================================
  - model_name: local-llama
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://ollama:11434
      # ↑ "ollama" = Docker service name from docker-compose.yml. Docker DNS resolves it automatically
    model_info:
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: local-vision
    litellm_params:
      model: ollama/gemma3:4b
      api_base: http://ollama:11434
    model_info:
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # ===========================================================================
  # TIER 2a: CLOUD MODELS via OpenRouter (Aggregator)
  # ===========================================================================
  #
  # OpenRouter is an API aggregator that provides access to 500+ models
  # through a single API key. LiteLLM handles the `openrouter/` prefix
  # natively — it knows to route to https://openrouter.ai/api/v1.
  #
  # API KEY NOTE: The api_key here is a placeholder. In practice, the
  # user's OpenRouter key is injected at runtime via the request body.
  # The `os.environ/OPENROUTER_API_KEY` is a fallback for admin-managed
  # deployments where the key is set as an environment variable.

  # CURATED FRONTIER SET — best 1-2 models from each major provider.
  # These are the models shown in the "Via OpenRouter" section of settings.

  - model_name: cloud-or-claude
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.000003    # $3 per 1M input tokens
      output_cost_per_token: 0.000015   # $15 per 1M output tokens

  - model_name: cloud-or-gpt4o
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.0000025   # $2.50 per 1M input tokens
      output_cost_per_token: 0.00001    # $10 per 1M output tokens

  - model_name: cloud-or-gemini-pro
    litellm_params:
      model: openrouter/google/gemini-2.5-pro
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.00000125  # $1.25 per 1M input tokens
      output_cost_per_token: 0.00001    # $10 per 1M output tokens

  - model_name: cloud-or-gemini-flash
    litellm_params:
      model: openrouter/google/gemini-2.5-flash
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.0000003   # $0.30 per 1M input tokens
      output_cost_per_token: 0.0000025  # $2.50 per 1M output tokens

  - model_name: cloud-or-o3-mini
    litellm_params:
      model: openrouter/openai/o3-mini
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.0000011   # $1.10 per 1M input tokens
      output_cost_per_token: 0.0000044  # $4.40 per 1M output tokens

  - model_name: cloud-or-deepseek-r1
    litellm_params:
      model: openrouter/deepseek/deepseek-r1
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.0000007   # $0.70 per 1M input tokens
      output_cost_per_token: 0.0000025  # $2.50 per 1M output tokens

  - model_name: cloud-or-llama-maverick
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.00000017  # $0.17 per 1M input tokens
      output_cost_per_token: 0.0000006  # $0.60 per 1M output tokens

  - model_name: cloud-or-deepseek-v3
    litellm_params:
      model: openrouter/deepseek/deepseek-chat
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.00000038  # $0.38 per 1M input tokens
      output_cost_per_token: 0.00000089 # $0.89 per 1M output tokens

  - model_name: cloud-or-glm5
    litellm_params:
      model: openrouter/z-ai/glm-5
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.00000095  # $0.95 per 1M input tokens
      output_cost_per_token: 0.00000255 # $2.55 per 1M output tokens

  # ===========================================================================
  # TIER 2b: CLOUD MODELS via Direct Provider Keys
  # ===========================================================================
  #
  # These call the provider API directly (no aggregator hop).
  # For users who already have their own API keys from Anthropic or OpenAI.

  - model_name: cloud-claude
    litellm_params:
      model: claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.000003    # $3 per 1M input tokens
      output_cost_per_token: 0.000015   # $15 per 1M output tokens

  # Claude Haiku - Fast & cheap model for complexity judging
  - model_name: cloud-haiku
    litellm_params:
      model: claude-3-5-haiku-20241022
      api_key: os.environ/ANTHROPIC_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.0000008   # $0.80 per 1M input tokens
      output_cost_per_token: 0.000004   # $4 per 1M output tokens

  - model_name: cloud-gpt
    litellm_params:
      model: gpt-4o
      api_key: os.environ/OPENAI_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.0000025   # $2.50 per 1M input tokens
      output_cost_per_token: 0.00001    # $10 per 1M output tokens

  - model_name: cloud-gpt-cheap
    litellm_params:
      model: gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.00000015  # $0.15 per 1M input tokens
      output_cost_per_token: 0.0000006  # $0.60 per 1M output tokens

  # ===========================================================================
  # TIER 3: CAMPUS GPU (Lakeshore vLLM)
  # ===========================================================================

# LAKESHORE TIER (via Proxy)
  # All Lakeshore models route through the proxy, which forwards to the
  # correct vLLM instance via Globus Compute (preferred) or SSH (fallback).
  # $0 per token — runs on university-owned GPUs.

  # 72B VL AWQ model (multimodal flagship, runs on H100 NVL, ~25 tok/s)
  - model_name: lakeshore-qwen-vl-72b
    litellm_params:
      model: openai/Qwen/Qwen2.5-VL-72B-Instruct-AWQ
      api_base: http://lakeshore-proxy:8001/v1
      api_key: dummy  # pragma: allowlist secret
    model_info:
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

# =============================================================================
# ROUTER SETTINGS
# =============================================================================

router_settings:
  model_timeout:
    local-llama: 90
    local-vision: 120
    lakeshore-qwen-vl-72b: 180
    cloud-claude: 120
    cloud-gpt: 120
    cloud-gpt-cheap: 120
    cloud-or-claude: 120
    cloud-or-gpt4o: 120
    cloud-or-gemini-pro: 120
    cloud-or-gemini-flash: 120
    cloud-or-o3-mini: 180
    cloud-or-deepseek-r1: 180
    cloud-or-llama-maverick: 120
    cloud-or-deepseek-v3: 120
    cloud-or-glm5: 120

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  # Cost tracking (ENABLED)
  track_cost_per_deployment: true
  store_model_in_db: true # Store model details in DB for cost tracking

  # Verbose logging
  set_verbose: false  # Set to true only for debugging

  # For simple in-memory cache:
  cache: true
  cache_params:
    type: local # In-memory cache
    ttl: 3600  # Time to live for cached responses (in seconds)

  # For production
  # cache_params:
  #   type: redis
  #   host: redis
  #   port: 6379

  # Budget settings (cost control)
  max_budget: 100         # Maximum spend in USD
  budget_duration: 30d    # Budget resets every 30 days
