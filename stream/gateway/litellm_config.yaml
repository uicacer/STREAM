# ======================================================================================
# STREAM Gateway - LiteLLM Configuration (https://docs.litellm.ai/docs/proxy/configs)
# ======================================================================================

model_list:
  # ===========================================================================
  # TIER 1: LOCAL MODELS (Ollama)
  # ===========================================================================
  - model_name: local-llama-tiny
    litellm_params:
      model: ollama/llama3.2:1b
      api_base: http://ollama:11434
      # ↑ "ollama" = Docker service name from docker-compose.yml. Docker DNS (Domain Name System) resolves it automatically
    model_info:
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0
      # max_tokens: 4096 # Optional: override model default
      # rpm: 60  # Rate limit (requests per minute)
      # tpm: 100000  # Token limit (tokens per minute)

  - model_name: local-llama
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://ollama:11434
    model_info:
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0
      # max_tokens: 4096
      # rpm: 60  # Rate limit (requests per minute)
      # tpm: 100000  # Token limit (tokens per minute)

  - model_name: local-llama-quality
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://ollama:11434
    model_info:
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0
      # max_tokens: 8192
      # rpm: 60  # Rate limit (requests per minute)
      # tpm: 100000  # Token limit (tokens per minute)

  # ===========================================================================
  # TIER 2: CLOUD MODELS (Paid APIs)
  # ===========================================================================

  - model_name: cloud-claude
    litellm_params:
      model: claude-sonnet-4-20250514
      # NO api_base needed! LiteLLM automatically knows: api_base = https://api.openai.com/v1
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      input_cost_per_token: 0.000003    # $3 per 1M input tokens
      output_cost_per_token: 0.000015   # $15 per 1M output tokens
      # max_tokens: 8192
      # rpm: 60  # Rate limit (requests per minute)
      # tpm: 100000  # Token limit (tokens per minute)

  # Claude Haiku - Fast & cheap model for complexity judging
  - model_name: cloud-haiku
    litellm_params:
      model: claude-3-5-haiku-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      input_cost_per_token: 0.0000008   # $0.80 per 1M input tokens
      output_cost_per_token: 0.000004   # $4 per 1M output tokens
      # Cost per judgment: ~$0.0002 (conservative estimate)
      # Approximate: ~$1 per 5,000 judgments

  - model_name: cloud-gpt
    litellm_params:
      model: gpt-4-turbo-2024-04-09
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      input_cost_per_token: 0.00001     # $10 per 1M input tokens
      output_cost_per_token: 0.00003    # $30 per 1M output tokens
      # max_tokens: 4096
      # rpm: 60  # Rate limit (requests per minute)
      # tpm: 100000  # Token limit (tokens per minute)

  - model_name: cloud-gpt-cheap
    litellm_params:
      model: gpt-3.5-turbo-0125
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      input_cost_per_token: 0.0000005   # $0.50 per 1M input tokens
      output_cost_per_token: 0.0000015  # $1.50 per 1M output tokens
      # max_tokens: 4096
      # rpm: 60  # Rate limit (requests per minute)
      # tpm: 100000  # Token limit (tokens per minute)

  # ===========================================================================
  # TIER 3: CAMPUS GPU (Lakeshore vLLM)
  # ===========================================================================

# LAKESHORE TIER (via Proxy)
  # All Lakeshore models route through the proxy, which forwards to the
  # correct vLLM instance via Globus Compute (preferred) or SSH (fallback).
  # $0 per token — runs on university-owned GPUs.

  - model_name: lakeshore-qwen-32b
    litellm_params:
      model: openai/Qwen/Qwen2.5-32B-Instruct-AWQ
      api_base: http://lakeshore-proxy:8001/v1
      api_key: dummy
    model_info:
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: lakeshore-coder-32b
    litellm_params:
      model: openai/Qwen/Qwen2.5-Coder-32B-Instruct-AWQ
      api_base: http://lakeshore-proxy:8001/v1
      api_key: dummy
    model_info:
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: lakeshore-deepseek-r1
    litellm_params:
      model: openai/deepseek-ai/DeepSeek-R1-Distill-Qwen-32B
      api_base: http://lakeshore-proxy:8001/v1
      api_key: dummy
    model_info:
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: lakeshore-qwq
    litellm_params:
      model: openai/Qwen/QwQ-32B-AWQ
      api_base: http://lakeshore-proxy:8001/v1
      api_key: dummy
    model_info:
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # Legacy — kept for backwards compatibility during testing
  - model_name: lakeshore-qwen
    litellm_params:
      model: openai/Qwen/Qwen2.5-1.5B-Instruct
      api_base: http://lakeshore-proxy:8001/v1
      api_key: dummy
    model_info:
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

# =============================================================================
# ROUTER SETTINGS
# =============================================================================

router_settings:
  model_timeout:
    local-llama-tiny: 60    # Allow time for model loading
    local-llama: 90
    local-llama-quality: 120
    lakeshore-qwen: 120
    lakeshore-qwen-32b: 120
    lakeshore-coder-32b: 120
    lakeshore-deepseek-r1: 120
    lakeshore-qwq: 120
    cloud-claude: 120
    cloud-gpt: 120

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  # Cost tracking (ENABLED)
  track_cost_per_deployment: true
  store_model_in_db: true # Store model details in DB for cost tracking

  # Verbose logging
  set_verbose: false  # Set to true only for debugging

  # For simple in-memory cache:
  cache: true
  cache_params:
    type: local # In-memory cache
    ttl: 3600  # Time to live for cached responses (in seconds)

  # For production
  # cache_params:
  #   type: redis
  #   host: redis
  #   port: 6379

  # Budget settings (cost control)
  max_budget: 100         # Maximum spend in USD
  budget_duration: 30d    # Budget resets every 30 days
