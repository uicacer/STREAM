# =============================================================================
# STREAM Gateway - Docker Compose Configuration
# =============================================================================
# This file defines and orchestrates the gateway services for STREAM:
# 1. Ollama  - Local AI model inference engine
# 2. LiteLLM - AI gateway/router that manages multiple LLM providers
#
# WHAT IS DOCKER COMPOSE?
# Docker Compose is a tool for defining multi-container applications.
# Instead of manually starting each service, this file lets you:
#   - Start everything with one command: docker-compose up -d
#   - Stop everything with: docker-compose down
#   - View logs with: docker-compose logs -f
#
# WHY USE DOCKER?
# - Consistent environment (works the same everywhere)
# - Easy to deploy (just docker-compose up)
# - Isolated from your system (won't mess with your Python)
# - Easy to update (just pull new images)
# - Easy to remove (just docker-compose down)
# =============================================================================


# =============================================================================
# SERVICES - Individual containers that work together
# =============================================================================
# Think of services as separate programs that can talk to each other
# Each service runs in its own container (isolated environment)

services:

  # ---------------------------------------------------------------------------
  # SERVICE 1: OLLAMA - Local AI Model Runner
  # ---------------------------------------------------------------------------
  # Ollama runs AI models locally on your machine
  # Think of it as: Your own private ChatGPT running on your computer
  #
  # Why we need it:
  # - FREE (no API costs)
  # - PRIVATE (data never leaves your machine)
  # - FAST (no network latency)
  # - OFFLINE (works without internet)
  ollama:
    # Image: Pre-built software package to download
    # "ollama/ollama:latest" means:
    #   - ollama/ollama = the official Ollama image
    #   - :latest = always get the newest version
    image: ollama/ollama:latest

    # Container name: What to call this when it's running
    # You'll see "stream-ollama" when you run: docker ps
    container_name: stream-ollama


    # Ports: Make the service accessible from your computer
    # Format: "host_port:container_port"
    # "11434:11434" means:
    #   - Inside container: Ollama listens on 11434
    #   - On your computer: Access at localhost:11434
    #
    # Test it: curl http://localhost:11434/api/tags
    ports:
      - "11434:11434"

    # Volumes: Persistent storage (data survives container restarts)
    # Format: "volume_name:container_path"
    #
    # Why we need this:
    # - Models are LARGE (3-40GB each)
    # - Without volumes, you'd re-download on every restart
    # - With volumes, models persist between restarts
    #
    # "ollama_models:/root/.ollama" means:
    #   - Create a Docker volume called "ollama_models"
    #   - Mount it at /root/.ollama inside the container
    #   - This is where Ollama stores downloaded models
    volumes:
      - ollama_models:/root/.ollama

    # Restart policy: What to do if container crashes
    # "unless-stopped" means:
    #   - Auto-restart if it crashes
    #   - Don't restart if you manually stopped it
    #   - Restart on system reboot
    restart: unless-stopped

    # Networks: Which virtual network to join
    # Containers on the same network can talk to each other
    # LiteLLM will use this to reach Ollama at: http://ollama:11434
    networks:
      - stream-network

    # Resource limits: Control CPU and memory usage
    # Prevents Ollama from using too much of your system
    deploy:
      resources:
        limits:
          cpus: '${OLLAMA_CPUS:-4.0}'      # Default 4 CPUs if not set
          memory: ${OLLAMA_MEMORY:-8G}      # Default 8GB if not set
        reservations:
          cpus: '${OLLAMA_CPUS_MIN:-1.0}'   # Minimum guaranteed
          memory: ${OLLAMA_MEMORY_MIN:-2G}  # Minimum guaranteed


    # Health check: Is the service working?
    # Docker will periodically test this to verify Ollama is responsive
    healthcheck:
      # Command to test health
      # curl -f fails on HTTP errors (returns exit code 1)
      test: ["CMD", "ollama", "list"]

      # How long to wait before first check
      interval: 30s

      # How long to wait for response
      timeout: 10s

      # How many failures before marking unhealthy
      retries: 3

      # How long to wait on container start before checking
      start_period: 60s

  # ---------------------------------------------------------------------------
  # SERVICE 2: LITELLM - AI Gateway/Router
  # ---------------------------------------------------------------------------
  # LiteLLM is the "traffic controller" that routes requests to different
  # AI providers (Ollama, Claude, GPT, etc.)
  #
  # Why we need it:
  # - One API for all AI providers (no code changes to switch)
  # - Cost tracking (know who spent how much)
  # - Rate limiting (prevent overspending)
  # - Fallbacks (if Ollama fails, try Claude)
  # - Logging (audit all AI requests)
  litellm:
    # Official LiteLLM proxy image
    # This is the gateway/router component
    image: ghcr.io/berriai/litellm:main-latest

    container_name: stream-litellm

    # Port 4000: LiteLLM's default port
    # Your Python code will call: http://localhost:4000/chat/completions
    ports:
      - "4000:4000"

    # Security options: Harden the container. This means :
    # - no-new-privileges: Prevent privilege escalation (container can't gain extra privileges)
    # - read_only: Filesystem is read-only (prevents tampering; no writes)
    # - tmpfs: /tmp is in-memory only (no disk writes)
    security_opt:
      - no-new-privileges:true


    # Volumes: Give LiteLLM access to files on your computer
    # Format: "path_on_computer:path_in_container"
    #
    # "./litellm_config.yaml:/app/config.yaml" means:
    #   - File on your computer: gateway/litellm_config.yaml
    #   - Mounted at: /app/config.yaml inside container
    #   - LiteLLM reads this to know available models
    #   - Changes to this file require: docker-compose restart litellm
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
      # ":ro" means read-only (container can't modify your file)

      # Database for logging (optional but recommended)
      # Stores request logs, cost data, etc.
      - litellm_data:/app/data

    # Environment variables: Pass secrets and settings
    # Format: "VARIABLE_NAME=value"
    #
    # These are loaded from your .env file at project root
    # Docker Compose automatically reads .env files
    environment:
      # API keys for cloud providers
      # ${VAR_NAME} syntax reads from .env or system environment
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # LiteLLM database (PostgreSQL)
      # Stores: request logs, costs, rate limit counters
      - DATABASE_URL=postgresql://${POSTGRES_USER:-litellm_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-litellm_db}

      # Master key: Password to access LiteLLM
      # Required for all requests to the proxy
      # Change this to something secure!
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}

      # Enable detailed logging (helpful for debugging)
      - LITELLM_LOG=INFO

      # Lakeshore vLLM endpoints (optional - for campus GPU access)
      - LAKESHORE_VLLM_ENDPOINT=${LAKESHORE_VLLM_ENDPOINT:-}

    # Command: What to run when container starts
    # Overrides the default command in the Docker image
    #
    # "--config /app/config.yaml" tells LiteLLM where to find config
    # "--port 4000" tells it which port to listen on
    # "--detailed_debug" shows verbose logs (optional, good for learning)
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]

    # Depends on: Wait for other services before starting
    # LiteLLM needs Ollama to be running, so we wait
    #
    # This ensures:
    # 1. Ollama starts first
    # 2. LiteLLM starts after Ollama is healthy
    # 3. No "connection refused" errors
    depends_on:
      ollama:
        condition: service_healthy
        # Only start LiteLLM after Ollama passes health check

    restart: unless-stopped

    networks:
      - stream-network

    # Health check: Is LiteLLM responding?
    healthcheck:
      # LiteLLM has a /health endpoint
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health/liveliness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


  # ===========================================================================
  # SERVICE 3: POSTGRESQL - Database for LiteLLM
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: stream-postgres

    environment:
      # Database credentials - loaded from .env file
      - POSTGRES_USER=${POSTGRES_USER:-litellm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - POSTGRES_DB=${POSTGRES_DB:-litellm_db}

      # Performance tuning
      - POSTGRES_INITDB_ARGS=-E UTF8

    ports:
      - "5432:5432"

    volumes:
      # Persistent database storage
      - postgres_data:/var/lib/postgresql/data

      # Optional: Custom init scripts
      # - ./init-scripts:/docker-entrypoint-initdb.d

    restart: unless-stopped

    networks:
      - stream-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm_user -d litellm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s



# =============================================================================
# NETWORKS - Virtual networks for container communication
# =============================================================================
# Containers on the same network can talk using container names
# Example: LiteLLM can reach Ollama at: http://ollama:11434
#
# Why we need this:
# - Isolated from your computer's network
# - Containers can use simple names (no IPs)
# - Secure (only containers in network can communicate)
networks:
  stream-network:
    # Driver: How to create the network
    # "bridge" is the default for single-host setups
    driver: bridge

    # Name: What Docker calls this network
    # You'll see "stream_stream-network" in: docker network ls
    name: stream_network

# =============================================================================
# VOLUMES - Persistent storage
# =============================================================================
# Named volumes store data outside containers
# Data persists even if containers are deleted
#
# Why we need volumes:
# - Models are large (don't re-download on restart)
# - Logs are valuable (don't lose on restart)
# - Databases need persistence (SQLite file)
volumes:
  # Stores Ollama models (~4GB per model)
  # Location on disk: /var/lib/docker/volumes/ollama_models
  # You can delete with: docker volume rm ollama_models
  ollama_models:
    name: stream_ollama_models

  # Stores LiteLLM data (database, logs)
  # Much smaller (~100MB typically)
  litellm_data:
    name: stream_litellm_data

  # PostgreSQL data (database files)
  postgres_data:
    name: stream_postgres_data
