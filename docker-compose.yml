# =============================================================================
# STREAM - Complete Service Stack
# All configuration comes from .env file
# =============================================================================

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres: # This becomes DNS name
    image: postgres:16-alpine
    container_name: stream-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:${POSTGRES_PORT}" # Left side: Port on your laptop/server; Right side: Port in Docker container
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - stream-network
    healthcheck:
    # CMD-SHELL means to run the command in a shell
    # We use CMD-SHELL not just CMD because we need shell features like pipes
    # pipes means we can chain commands together. Like this:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Ollama - Local LLM Server
  # ==========================================================================
  ollama:
    image: ollama/ollama:0.14.1
    container_name: stream-ollama
    ports:
      - "${OLLAMA_EXTERNAL_PORT}:${OLLAMA_PORT}" # Left side: Port on your laptop/server; Right side: Port in Docker container
    volumes:
      - ollama_models:/root/.ollama
    environment:
      # Keep models loaded in memory for 30 minutes (default is 5m)
      # This prevents slow first-request latency after idle periods
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY:-8G}
          cpus: '${OLLAMA_CPUS:-4.0}'
    restart: unless-stopped
    networks:
      - stream-network
    healthcheck:
    # We only use CMD here because we don't need shell features
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Lakeshore Proxy - Routes requests via Globus Compute or SSH
  # ==========================================================================
  lakeshore-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: stream-lakeshore-proxy
    ports:
      - "8001:8001"  # Proxy port (internal service, not usually accessed from host)
    env_file:
      - .env
    environment:
      - USE_GLOBUS_COMPUTE=${USE_GLOBUS_COMPUTE}
      - GLOBUS_COMPUTE_ENDPOINT_ID=${GLOBUS_COMPUTE_ENDPOINT_ID}
      - VLLM_SERVER_URL=${VLLM_SERVER_URL}
      - LAKESHORE_VLLM_ENDPOINT=${LAKESHORE_VLLM_ENDPOINT}
      - PROXY_HOST=0.0.0.0
      - PROXY_PORT=8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Mount Globus credentials from host so the proxy can authenticate
      # Using ${HOME} instead of ~ because ~ doesn't expand in Docker Compose
      - ${HOME}/.globus_compute:/root/.globus_compute:rw
    restart: unless-stopped
    networks:
      - stream-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # LiteLLM - AI Gateway
  # ==========================================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.80.16-nightly
    container_name: stream-litellm
    ports:
      - "${LITELLM_EXTERNAL_PORT}:${LITELLM_PORT}" # Left side: Port on your laptop/server; Right side: Port in Docker container
    volumes:
      - ./stream/gateway/litellm_config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      # API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}

      # Database connection (internal Docker network). LiteLLM needs DATABASE_URL to know where to log
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}

      # Ollama connection (internal Docker network)
      - OLLAMA_API_BASE=http://ollama:${OLLAMA_PORT}
    command: ["--config", "/app/config.yaml", "--port", "${LITELLM_PORT}", "--detailed_debug"]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      lakeshore-proxy:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stream-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${LITELLM_PORT}/health/readiness')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================================================
  # STREAM Middleware - Smart Routing Layer
  # ==========================================================================
  middleware:
    build:
      context: .
      dockerfile: Dockerfile.middleware
    container_name: stream-middleware
    ports:
      - "${MIDDLEWARE_EXTERNAL_PORT}:${MIDDLEWARE_PORT}" # Left side: Port on your laptop/server; Right side: Port in Docker container
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=${OLLAMA_PORT}
      # LiteLLM connection (internal Docker network — override .env localhost defaults)
      - LITELLM_BASE_URL=http://litellm:${LITELLM_PORT}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}

      # Lakeshore vLLM connection (via SSH tunnel on host)
      - LAKESHORE_VLLM_ENDPOINT=${LAKESHORE_VLLM_ENDPOINT}

      - MIDDLEWARE_PORT=${MIDDLEWARE_PORT}

      # Database connection (internal Docker network — override .env localhost defaults)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      litellm:
        condition: service_healthy
      ollama:
        condition: service_healthy
      lakeshore-proxy:
        condition: service_healthy
    restart: unless-stopped # This will always restart the container unless you explicitly stop it
    networks:
      - stream-network # This creates an isolated network for the services to communicate
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${MIDDLEWARE_PORT}/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G      # Prevent using more than 2GB
          cpus: '2.0'     # Max 2 CPU cores
        reservations:
          memory: 512M    # Guarantee at least 512MB
          cpus: '0.5'     # Guarantee at least 0.5 cores

  # ==========================================================================
  # Streamlit Frontend - Chat Interface
  # ==========================================================================
  # COMMENTED OUT: Frontend runs on host for Globus OAuth authentication.
  # The browser-based OAuth flow requires the frontend to run on the host
  # machine so it can open the browser and receive the OAuth callback.
  # To run: streamlit run frontends/streamlit/streamlit_app.py
  # ==========================================================================
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.frontend
  #   container_name: stream-frontend
  #   ports:
  #     - "${FRONTEND_EXTERNAL_PORT}:${FRONTEND_PORT}"
  #   env_file:
  #     - .env
  #   environment:
  #     - MIDDLEWARE_URL=${MIDDLEWARE_URL}
  #     - STREAMLIT_SERVER_PORT=${FRONTEND_PORT}
  #   depends_on:
  #     middleware:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   networks:
  #     - stream-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${FRONTEND_PORT}/health')\" || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1G
  #         cpus: '1.0'
  #       reservations:
  #         memory: 256M
  #         cpus: '0.25'
# =============================================================================
# Networks
# =============================================================================
networks:
  stream-network:
    name: stream_network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  ollama_models:
    name: stream_ollama_models
  postgres_data:
    name: stream_postgres_data
